services:
  app:
    build:
      context: ..
      dockerfile: Docker/Dockerfile
    container_name: finalyearproject_app
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL_DOCKER}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATA_REDIS_URL: redis://cache:6379
      EMAIL_USERNAME: hassanrrafai5@gmail.com
      EMAIL_PASSWORD: rsxyhxcjbeyfewtr
      key: C1A+AvvnBjNYOA4cisu6JDFVYzmMInGzZh3qCDZUFh8=
    depends_on:
      cache:
        condition: service_started
    restart: unless-stopped
    networks:
      - app-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  cache:
    image: redis:7
    container_name: finalyearproject_cache
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - app-network

volumes:
  redis-data:

networks:
  app-network:
    driver: bridge