<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verify OTP - Question Paper System</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
    <style>
        /* Additional styles for 4-digit OTP input */
        .otp-group {
            margin-bottom: 20px;
        }

        .otp-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 500;
            color: #333;
        }

        .otp-digits {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .otp-digit {
            width: 60px;
            height: 70px;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            border: 2px solid #ddd;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .otp-digit:focus {
            outline: none;
            border-color: #4CAF50;
            box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.1);
        }

        .info-text {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
            color: #666;
        }

        .success {
            color: #155724;
            background-color: #d4edda;
            border: 1px solid #c3e6cb;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
        }

        .error {
            color: #721c24;
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
        }

        .resend-link {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .resend-link a {
            color: #4CAF50;
            text-decoration: none;
            font-size: 14px;
        }

        .resend-link a:hover {
            text-decoration: underline;
        }

        .timer {
            text-align: center;
            margin-top: 10px;
            font-size: 12px;
            color: #999;
        }

        @media (max-width: 480px) {
            .otp-digit {
                width: 50px;
                height: 60px;
                font-size: 24px;
            }
        }
    </style>
</head>

<body>
<div class="login-container">
    <h1 class="login-title">Verify OTP</h1>
    <p style="text-align:center; margin-bottom: 20px;">Please enter the 4-digit OTP sent to your email.</p>

    <!-- Display email from Model -->
    <div class="info-text">
        <strong>Email:</strong> <span th:text="${email}"></span>
    </div>

    <form id="otpForm">
        <div class="otp-group">
            <label>One-Time Password (OTP):</label>
            <div class="otp-digits">
                <input type="text" maxlength="1" class="otp-digit" id="digit1" autofocus>
                <input type="text" maxlength="1" class="otp-digit" id="digit2">
                <input type="text" maxlength="1" class="otp-digit" id="digit3">
                <input type="text" maxlength="1" class="otp-digit" id="digit4">
            </div>
        </div>

        <button type="submit" id="verifyBtn">Verify Account</button>
    </form>

    <div class="resend-link">
        <a href="#" id="resendBtn">Didn't receive OTP? Resend</a>
        <div id="timer" class="timer"></div>
    </div>

    <div id="message" style="margin-top: 20px;"></div>
</div>

<script th:src="@{/js/api.js}"></script>
<script>
    // Get token and email from Model (injected by Spring)
    const token = [[${token}]];
    const email = [[${email}]];

    // OTP input handling (4 digits)
    const digits = ['digit1', 'digit2', 'digit3', 'digit4'];

    // Auto-focus navigation
    digits.forEach((id, index) => {
        const input = document.getElementById(id);

        input.addEventListener('input', function(e) {
            // Only allow numbers
            this.value = this.value.replace(/[^0-9]/g, '');

            if (this.value.length === 1) {
                if (index < digits.length - 1) {
                    document.getElementById(digits[index + 1]).focus();
                } else {
                    // Auto-submit when last digit is entered
                    document.getElementById('verifyBtn').click();
                }
            }
        });

        input.addEventListener('keydown', function(e) {
            if (e.key === 'Backspace' && this.value.length === 0 && index > 0) {
                document.getElementById(digits[index - 1]).focus();
            }
        });

        // Allow paste functionality
        input.addEventListener('paste', function(e) {
            e.preventDefault();
            const pastedData = e.clipboardData.getData('text');
            const numbers = pastedData.replace(/[^0-9]/g, '').split('');

            for (let i = 0; i < Math.min(numbers.length, digits.length - index); i++) {
                const targetInput = document.getElementById(digits[index + i]);
                if (targetInput) {
                    targetInput.value = numbers[i];
                }
            }

            // Focus on the next empty field or last field
            const lastFilledIndex = Math.min(index + numbers.length, digits.length) - 1;
            document.getElementById(digits[lastFilledIndex]).focus();

            // Auto-submit if all digits are filled
            const allFilled = digits.every(digitId => document.getElementById(digitId).value.length === 1);
            if (allFilled) {
                document.getElementById('verifyBtn').click();
            }
        });
    });

    // Get full OTP
    function getOtp() {
        let otp = '';
        digits.forEach(id => {
            otp += document.getElementById(id).value;
        });
        return otp;
    }

    // Clear OTP fields
    function clearOtpFields() {
        digits.forEach(id => {
            document.getElementById(id).value = '';
        });
        document.getElementById('digit1').focus();
    }

    // Show message
    function showMessage(text, isError = false) {
        const messageDiv = document.getElementById('message');
        messageDiv.innerHTML = `<div class="${isError ? 'error' : 'success'}">${text}</div>`;

        if (!isError) {
            setTimeout(() => {
                messageDiv.innerHTML = '';
            }, 3000);
        }
    }

    // Clear message
    function clearMessage() {
        const messageDiv = document.getElementById('message');
        messageDiv.innerHTML = '';
    }

    // Verify OTP
    document.getElementById("otpForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        clearMessage();

        const verifyBtn = document.getElementById("verifyBtn");
        const otp = getOtp();

        if (otp.length !== 4) {
            showMessage("Please enter all 4 digits", true);
            return;
        }

        verifyBtn.disabled = true;
        verifyBtn.textContent = "Verifying...";

        try {
            // Use AuthAPI.confirm which expects (token, email, otp)
            const response = await AuthAPI.confirm(token, email, parseInt(otp));

            showMessage("✅ Account verified successfully! Redirecting to login...");

            setTimeout(() => {
                window.location.href = "/login";
            }, 3000);

        } catch (error) {
            console.error("Verification error:", error);
            showMessage(error.message || "Verification failed. Please check your OTP.", true);
            verifyBtn.disabled = false;
            verifyBtn.textContent = "Verify Account";
            clearOtpFields();  // Clear OTP fields for retry
        }
    });

    // Resend OTP
    document.getElementById("resendBtn").addEventListener("click", async (e) => {
        e.preventDefault();

        const resendBtn = document.getElementById("resendBtn");
        resendBtn.style.pointerEvents = "none";
        resendBtn.style.opacity = "0.5";

        try {
            // Call resend OTP endpoint
            const response = await fetch(`/api/v1/auth/resend-otp?email=${encodeURIComponent(email)}`, {
                method: "POST"
            });

            if (response.ok) {
                showMessage("📧 New OTP sent to your email!");
                startTimer(60); // Start 60 second cooldown
            } else {
                const data = await response.json();
                showMessage(data.message || "Failed to resend OTP. Please try again.", true);
                resendBtn.style.pointerEvents = "auto";
                resendBtn.style.opacity = "1";
            }
        } catch (error) {
            showMessage("Network error. Please try again.", true);
            resendBtn.style.pointerEvents = "auto";
            resendBtn.style.opacity = "1";
        }
    });

    // Timer for resend cooldown
    function startTimer(seconds) {
        const timerDiv = document.getElementById('timer');
        let remaining = seconds;

        timerDiv.style.display = 'block';

        const interval = setInterval(() => {
            if (remaining <= 0) {
                clearInterval(interval);
                timerDiv.style.display = 'none';
                document.getElementById('resendBtn').style.pointerEvents = 'auto';
                document.getElementById('resendBtn').style.opacity = '1';
            } else {
                timerDiv.textContent = `Resend available in ${remaining} seconds`;
                remaining--;
            }
        }, 1000);
    }
</script>
</body>
</html>
