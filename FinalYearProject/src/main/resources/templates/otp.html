<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verify OTP - Question Paper System</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
    <style>
        .otp-group {
            margin-bottom: 20px;
        }

        .otp-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 500;
            color: #333;
        }

        .otp-digits {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .otp-digit {
            width: 60px;
            height: 70px;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            border: 2px solid #ddd;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .otp-digit:focus {
            outline: none;
            border-color: #4CAF50;
            box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.1);
        }

        .info-text {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
            color: #666;
        }

        .success {
            color: #155724;
            background-color: #d4edda;
            border: 1px solid #c3e6cb;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
        }

        .error {
            color: #721c24;
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
        }

        .login-container {
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
        }

        .login-title {
            text-align: center;
            margin-bottom: 30px;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }

        button:hover:not(:disabled) {
            background-color: #45a049;
        }
    </style>
</head>

<body>
<div class="login-container">
    <h1 class="login-title">Verify OTP</h1>
    <p style="text-align:center; margin-bottom: 20px;">Please enter the 4-digit OTP sent to your email.</p>

    <div class="info-text">
        <strong>Email:</strong> <span th:text="${email}"></span>
    </div>

    <div class="otp-group">
        <label>One-Time Password (OTP):</label>
        <div class="otp-digits">
            <input type="text" maxlength="1" class="otp-digit" id="digit1" autofocus>
            <input type="text" maxlength="1" class="otp-digit" id="digit2">
            <input type="text" maxlength="1" class="otp-digit" id="digit3">
            <input type="text" maxlength="1" class="otp-digit" id="digit4">
        </div>
    </div>

    <button id="verifyBtn">Verify Account</button>

    <div id="message" style="margin-top: 20px;"></div>
</div>

<script th:src="@{/js/api.js}"></script>
<script th:inline="javascript">
    /*<![CDATA[*/
    // Get token and email from Model
    const token = [[${token}]];
    const email = [[${email}]];

    console.log('=== OTP Verification Page Loaded ===');
    console.log('Token:', token);
    console.log('Email:', email);
    console.log('AuthAPI available:', typeof AuthAPI !== 'undefined');
    /*]]>*/
</script>
<script>
    // Wait for DOM to be fully loaded
    document.addEventListener('DOMContentLoaded', function() {
        console.log('DOM fully loaded');

        // Check if AuthAPI is available
        if (typeof AuthAPI === 'undefined') {
            console.error('AuthAPI is not loaded!');
            const messageDiv = document.getElementById('message');
            if (messageDiv) {
                messageDiv.innerHTML = '<div class="error">Error: API not loaded. Please refresh the page.</div>';
            }
            return;
        }

        const digits = ['digit1', 'digit2', 'digit3', 'digit4'];

        // Setup OTP input fields
        digits.forEach((id, index) => {
            const input = document.getElementById(id);
            if (input) {
                input.addEventListener('input', function(e) {
                    this.value = this.value.replace(/[^0-9]/g, '');
                    if (this.value.length === 1 && index < digits.length - 1) {
                        document.getElementById(digits[index + 1]).focus();
                    }
                });

                input.addEventListener('keydown', function(e) {
                    if (e.key === 'Backspace' && this.value.length === 0 && index > 0) {
                        document.getElementById(digits[index - 1]).focus();
                    }
                });
            }
        });

        function getOtp() {
            let otp = '';
            digits.forEach(id => {
                const input = document.getElementById(id);
                otp += input ? input.value : '';
            });
            return otp;
        }

        function showMessage(text, isError = false) {
            const messageDiv = document.getElementById('message');
            if (messageDiv) {
                messageDiv.innerHTML = `<div class="${isError ? 'error' : 'success'}">${text}</div>`;
                if (!isError) {
                    setTimeout(() => {
                        messageDiv.innerHTML = '';
                    }, 3000);
                }
            }
        }

        function clearOtpFields() {
            digits.forEach(id => {
                const input = document.getElementById(id);
                if (input) input.value = '';
            });
            const firstInput = document.getElementById('digit1');
            if (firstInput) firstInput.focus();
        }

        // Handle verify button click
        const verifyBtn = document.getElementById('verifyBtn');
        if (verifyBtn) {
            verifyBtn.addEventListener('click', async function() {
                const otp = getOtp();

                if (otp.length !== 4) {
                    showMessage("Please enter all 4 digits", true);
                    return;
                }

                if (!token || !email) {
                    showMessage("Missing token or email. Please go back and try again.", true);
                    return;
                }

                verifyBtn.disabled = true;
                verifyBtn.textContent = "Verifying...";

                try {
                    console.log('Making API call with OTP:', parseInt(otp));
                    const response = await AuthAPI.confirm(token, email, parseInt(otp));
                    console.log('API Response:', response);

                    showMessage("✅ Account verified successfully! Redirecting to login...");

                    setTimeout(() => {
                        window.location.href = "/login";
                    }, 3000);

                } catch (error) {
                    console.error('Verification error:', error);
                    showMessage(error.message || "Verification failed. Please check your OTP.", true);
                    verifyBtn.disabled = false;
                    verifyBtn.textContent = "Verify Account";
                    clearOtpFields();
                }
            });
        } else {
            console.error('Verify button not found!');
        }
    });
</script>
</body>
</html>
