<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verify OTP - Question Paper System</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
</head>

<body>
<div class="login-container">
    <h1 class="login-title">Verify OTP</h1>
    <p style="text-align:center; margin-bottom: 20px;">Please enter the OTP sent to your email.</p>

    <form id="otpForm">
        <div class="form-group">
            <label for="otp">One-Time Password (OTP):</label>
            <input type="number" id="otp" name="otp" required placeholder="Enter OTP" autocomplete="off" />
        </div>

        <button type="submit" id="verifyBtn">Verify Account</button>
    </form>

    <div id="message" style="margin-top: 20px;"></div>
</div>

<script th:src="@{/js/api.js}"></script>
<script>
    document.getElementById("otpForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const verifyBtn = document.getElementById("verifyBtn");
        const messageDiv = document.getElementById("message");

        verifyBtn.disabled = true;
        verifyBtn.textContent = "Verifying...";
        messageDiv.innerHTML = "";

        const formData = new FormData(e.target);
        const otp = formData.get("otp");

        // Extract token and email from URL matching what AuthAPI.confirm expects
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get("token");
        const email = urlParams.get("email");

        if (!token || !email) {
            messageDiv.innerHTML = '<div class="error">Invalid verification link. Missing token or email.</div>';
            verifyBtn.disabled = false;
            verifyBtn.textContent = "Verify Account";
            return;
        }

        try {
            // Use AuthAPI from api.js
            const response = await AuthAPI.confirm(token, email, otp);
            
            messageDiv.innerHTML = '<div class="success">Account verified successfully! Redirecting to login...</div>';
            
            setTimeout(() => {
                window.location.href = "/login";
            }, 3000);
            
        } catch (error) {
            console.error("Verification error:", error);
            messageDiv.innerHTML = `<div class="error">${error.message || "Verification failed. Please check your OTP."}</div>`;
            verifyBtn.disabled = false;
            verifyBtn.textContent = "Verify Account";
        }
    });
</script>
</body>
</html>
