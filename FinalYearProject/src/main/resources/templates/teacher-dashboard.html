<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teacher Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
  </head>
  <body>
  <script th:src="@{/js/auth.js}"></script>
  <script>
      if (!Auth.isAuthenticated()) {
        window.location.href = "/login";
      }
  </script>
    <div class="dashboard">
      <div class="sidebar">
        <h2>Teacher Panel</h2>
        <ul>
          <li>
            <a href="#" onclick="showSection('questions')">Manage Questions</a>
          </li>
          <li>
            <a href="#" onclick="showSection('papers')">Question Papers</a>
          </li>
          <li><a href="#" onclick="logout()">Logout</a></li>
        </ul>
      </div>
      <div class="main-content">
        <h1>Question Management</h1>
        <div id="message"></div>

        <div id="questions" class="section">
          <div class="card">
            <h2>Add New Question</h2>
            <form id="addQuestionForm">
              <div class="form-group">
                <label for="questionText">Question:</label>
                <textarea id="questionText" rows="4" required></textarea>
              </div>
              <div class="form-group">
                <label for="subject">Subject:</label>
                <input type="text" id="subject" required />
              </div>
              <div class="form-group">
                <label for="difficulty">Difficulty:</label>
                <select id="difficulty" required>
                  <option value="easy">Easy</option>
                  <option value="medium">Medium</option>
                  <option value="hard">Hard</option>
                </select>
              </div>
              <div class="form-group">
                <label for="marks">Marks:</label>
                <input type="number" id="marks" required />
              </div>
              <button type="submit">Add Question</button>
            </form>
          </div>

          <div class="card">
            <h2>My Questions</h2>
            <div id="questionsList">
              <div class="loading">Loading questions...</div>
            </div>
          </div>
        </div>

        <div id="papers" class="section" style="display: none">
          <div class="card">
            <h2>Upload Question Paper</h2>
            <form id="uploadPaperForm">
              <div class="form-group">
                <label for="paperTitle">Paper Title:</label>
                <input type="text" id="paperTitle" required />
              </div>
              <div class="form-group">
                <label for="paperSubject">Subject:</label>
                <input type="text" id="paperSubject" required />
              </div>
              <div class="form-group">
                <label for="paperFile">PDF File:</label>
                <input type="file" id="paperFile" accept=".pdf" required />
              </div>
              <button type="submit">Upload Paper</button>
            </form>
          </div>

          <div class="card">
            <h2>My Papers</h2>
            <div id="papersList">
              <div class="loading">Loading papers...</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script th:src="@{/js/auth.js}"></script>
    <script th:src="@{/js/api.js}"></script>
    <script>
      if (!Auth.requireAuth("teacher")) return;

      function showSection(sectionName) {
        document.querySelectorAll(".section").forEach((section) => {
          section.style.display = "none";
        });
        document.getElementById(sectionName).style.display = "block";

        if (sectionName === "questions") loadQuestions();
        if (sectionName === "papers") loadPapers();
      }

      document
        .getElementById("addQuestionForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const questionData = {
            text: document.getElementById("questionText").value,
            subject: document.getElementById("subject").value,
            difficulty: document.getElementById("difficulty").value,
            marks: parseInt(document.getElementById("marks").value),
          };

          try {
            await TeacherAPI.createQuestion(questionData);
            document.getElementById("addQuestionForm").reset();
            showMessage("Question added successfully", "success");
            loadQuestions();
          } catch (error) {
            showMessage(`Failed to add question: ${error.message}`, "error");
          }
        });

      async function loadQuestions() {
        const questionsList = document.getElementById("questionsList");

        try {
          questionsList.innerHTML =
            '<div class="loading">Loading questions...</div>';
          const response = await TeacherAPI.getQuestions();
          displayQuestions(response.data);
        } catch (error) {
          questionsList.innerHTML = `<div class="error">Failed to load questions: ${error.message}</div>`;
        }
      }

      function displayQuestions(questions) {
        if (!questions || questions.length === 0) {
          document.getElementById("questionsList").innerHTML =
            '<div class="loading">No questions found</div>';
          return;
        }

        const html = `
                <table>
                    <thead>
                        <tr>
                            <th>Question</th>
                            <th>Subject</th>
                            <th>Difficulty</th>
                            <th>Marks</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${questions
                          .map(
                            (question) => `
                            <tr>
                                <td>${question.text}</td>
                                <td>${question.subject}</td>
                                <td>${question.difficulty}</td>
                                <td>${question.marks}</td>
                                <td>
                                    <button onclick="editQuestion(${question.id})">Edit</button>
                                    <button onclick="deleteQuestion(${question.id})">Delete</button>
                                </td>
                            </tr>
                        `
                          )
                          .join("")}
                    </tbody>
                </table>
            `;
        document.getElementById("questionsList").innerHTML = html;
      }

      async function deleteQuestion(questionId) {
        if (!confirm("Are you sure you want to delete this question?")) return;

        try {
          await TeacherAPI.deleteQuestion(questionId);
          showMessage("Question deleted successfully", "success");
          loadQuestions();
        } catch (error) {
          showMessage(`Failed to delete question: ${error.message}`, "error");
        }
      }

      function showMessage(text, type) {
        const messageDiv = document.getElementById("message");
        messageDiv.innerHTML = `<div class="${type}">${text}</div>`;
      }

      function logout() {
        Auth.logout();
      }

      loadQuestions();
    </script>
  </body>
</html>
