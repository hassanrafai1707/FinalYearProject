<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
  </head>
  <body>
  <script th:src="@{/js/auth.js}"></script>
  <script>
      if (!Auth.isAuthenticated()) {
        window.location.href = "/login";
      }
  </script>
  <div class="dashboard">
      <div class="sidebar">
        <h2>Admin Panel</h2>
        <ul>
          <li><a href="#" onclick="loadUsers()">Manage Users</a></li>
          <li><a href="#" onclick="logout()">Logout</a></li>
        </ul>
      </div>
      <div class="main-content">
        <h1>User Management</h1>
        <div id="message"></div>

        <div class="card">
          <h2>All Users</h2>
          <button onclick="showAddUserForm()" style="margin-bottom: 20px">
            Add New User
          </button>

          <div id="addUserForm" style="display: none; margin-bottom: 20px">
            <form id="createUserForm">
              <div class="form-group">
                <label for="newUserName">Name:</label>
                <input type="text" id="newUserName" required />
              </div>
              <div class="form-group">
                <label for="newUserEmail">Email:</label>
                <input type="email" id="newUserEmail" required />
              </div>
              <div class="form-group">
                <label for="newUserRole">Role:</label>
                <select id="newUserRole" required>
                  <option value="teacher">Teacher</option>
                  <option value="student">Student</option>
                  <option value="supervisor">Supervisor</option>
                </select>
              </div>
              <button type="submit">Create User</button>
              <button type="button" onclick="hideAddUserForm()">Cancel</button>
            </form>
          </div>

          <div id="usersList">
            <div class="loading">Loading users...</div>
          </div>
        </div>
      </div>
    </div>

    <script th:src="@{/js/auth.js}"></script>
    <script th:src="@{/js/api.js}"></script>
    <script>
      if (!Auth.requireAuth("admin")) return;

      async function loadUsers() {
        const usersList = document.getElementById("usersList");

        try {
          usersList.innerHTML = '<div class="loading">Loading users...</div>';
          const response = await AdminAPI.getUsers();
          displayUsers(response.data);
        } catch (error) {
          usersList.innerHTML = `<div class="error">Failed to load users: ${error.message}</div>`;
        }
      }

      function displayUsers(users) {
        if (!users || users.length === 0) {
          document.getElementById("usersList").innerHTML =
            '<div class="loading">No users found</div>';
          return;
        }

        const html = `
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${users
                          .map(
                            (user) => `
                            <tr>
                                <td>${user.name}</td>
                                <td>${user.email}</td>
                                <td>${user.role}</td>
                                <td>${user.status || "active"}</td>
                                <td>
                                    <button onclick="editUser(${
                                      user.id
                                    })">Edit</button>
                                    <button onclick="deleteUser(${
                                      user.id
                                    })">Delete</button>
                                </td>
                            </tr>
                        `
                          )
                          .join("")}
                    </tbody>
                </table>
            `;
        document.getElementById("usersList").innerHTML = html;
      }

      function showAddUserForm() {
        document.getElementById("addUserForm").style.display = "block";
      }

      function hideAddUserForm() {
        document.getElementById("addUserForm").style.display = "none";
        document.getElementById("createUserForm").reset();
      }

      document
        .getElementById("createUserForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const userData = {
            name: document.getElementById("newUserName").value,
            email: document.getElementById("newUserEmail").value,
            role: document.getElementById("newUserRole").value,
          };

          try {
            await AdminAPI.createUser(userData);
            hideAddUserForm();
            showMessage("User created successfully", "success");
            loadUsers();
          } catch (error) {
            showMessage(`Failed to create user: ${error.message}`, "error");
          }
        });

      async function deleteUser(userId) {
        if (!confirm("Are you sure you want to delete this user?")) return;

        try {
          await AdminAPI.deleteUser(userId);
          showMessage("User deleted successfully", "success");
          loadUsers();
        } catch (error) {
          showMessage(`Failed to delete user: ${error.message}`, "error");
        }
      }

      function editUser(userId) {
        alert("Edit user functionality to be implemented");
      }

      function showMessage(text, type) {
        const messageDiv = document.getElementById("message");
        messageDiv.innerHTML = `<div class="${type}">${text}</div>`;
      }

      function logout() {
        Auth.logout();
      }

      loadUsers();
    </script>
  </body>
</html>
