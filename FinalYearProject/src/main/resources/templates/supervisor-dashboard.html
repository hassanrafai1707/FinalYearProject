<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Supervisor Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
  </head>
  <body>
    <div class="dashboard">
      <div class="sidebar">
        <h2>Supervisor Panel</h2>
        <ul>
          <li><a href="#" onclick="loadPendingPapers()">Pending Review</a></li>
          <li>
            <a href="#" onclick="loadApprovedPapers()">Approved Papers</a>
          </li>
          <li><a href="#" onclick="logout()">Logout</a></li>
        </ul>
      </div>
      <div class="main-content">
        <h1>Paper Review</h1>
        <div id="message"></div>
        <div class="card">
          <div id="papersList">
            <div class="loading">Loading papers...</div>
          </div>
        </div>
      </div>
    </div>

    <script th:src="@{/js/auth.js}"></script>
    <script th:src="@{/js/api.js}"></script>
    <script>
      if (!Auth.requireAuth("supervisor")) return;

      async function loadPendingPapers() {
        const papersList = document.getElementById("papersList");

        try {
          papersList.innerHTML =
            '<div class="loading">Loading pending papers...</div>';
          const response = await SupervisorAPI.getPendingPapers();
          displayPendingPapers(response.data);
        } catch (error) {
          papersList.innerHTML = `<div class="error">Failed to load papers: ${error.message}</div>`;
        }
      }

      async function loadApprovedPapers() {
        const papersList = document.getElementById("papersList");

        try {
          papersList.innerHTML =
            '<div class="loading">Loading approved papers...</div>';
          const response = await SupervisorAPI.getApprovedPapers();
          displayApprovedPapers(response.data);
        } catch (error) {
          papersList.innerHTML = `<div class="error">Failed to load papers: ${error.message}</div>`;
        }
      }

      function displayPendingPapers(papers) {
        if (!papers || papers.length === 0) {
          document.getElementById("papersList").innerHTML =
            '<div class="loading">No papers pending review</div>';
          return;
        }

        const html = `
                <table>
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>Subject</th>
                            <th>Teacher</th>
                            <th>Submitted Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${papers
                          .map(
                            (paper) => `
                            <tr>
                                <td>${paper.title}</td>
                                <td>${paper.subject}</td>
                                <td>${paper.teacherName}</td>
                                <td>${new Date(
                                  paper.submittedDate
                                ).toLocaleDateString()}</td>
                                <td>
                                    <button onclick="approvePaper(${
                                      paper.id
                                    })">Approve</button>
                                    <button onclick="rejectPaper(${
                                      paper.id
                                    })">Reject</button>
                                </td>
                            </tr>
                        `
                          )
                          .join("")}
                    </tbody>
                </table>
            `;
        document.getElementById("papersList").innerHTML = html;
      }

      function displayApprovedPapers(papers) {
        if (!papers || papers.length === 0) {
          document.getElementById("papersList").innerHTML =
            '<div class="loading">No approved papers</div>';
          return;
        }

        const html = `
                <table>
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>Subject</th>
                            <th>Teacher</th>
                            <th>Approved Date</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${papers
                          .map(
                            (paper) => `
                            <tr>
                                <td>${paper.title}</td>
                                <td>${paper.subject}</td>
                                <td>${paper.teacherName}</td>
                                <td>${new Date(
                                  paper.approvedDate
                                ).toLocaleDateString()}</td>
                                <td>${paper.status}</td>
                            </tr>
                        `
                          )
                          .join("")}
                    </tbody>
                </table>
            `;
        document.getElementById("papersList").innerHTML = html;
      }

      async function approvePaper(paperId) {
        if (!confirm("Are you sure you want to approve this paper?")) return;

        try {
          await SupervisorAPI.approvePaper(paperId);
          showMessage("Paper approved successfully", "success");
          loadPendingPapers();
        } catch (error) {
          showMessage(`Failed to approve paper: ${error.message}`, "error");
        }
      }

      async function rejectPaper(paperId) {
        const feedback = prompt("Please provide feedback for rejection:");
        if (!feedback) return;

        try {
          await SupervisorAPI.rejectPaper(paperId, feedback);
          showMessage("Paper rejected successfully", "success");
          loadPendingPapers();
        } catch (error) {
          showMessage(`Failed to reject paper: ${error.message}`, "error");
        }
      }

      function showMessage(text, type) {
        const messageDiv = document.getElementById("message");
        messageDiv.innerHTML = `<div class="${type}">${text}</div>`;
      }

      function logout() {
        Auth.logout();
      }

      loadPendingPapers();
    </script>
  </body>
</html>
