# for local testing

#server config
logging.level.com.FinalYearProject=DEBUG
app.version=/api/v1
server.port=8080

# database config
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:finalyearproject}
spring.datasource.username=${dbUser:postgres}
spring.datasource.password=${dbPassword:yourNewPassword}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
spring.thymeleaf.enabled=true

# Email configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${CompanyEmail}
spring.mail.password=${CompanyPassword}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Redis configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379

# spring.data.redis.url=${redisLink}